<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">OpenUI agent review workbench flow</title>
  <desc id="desc">A visual flow showing MCP tool results becoming a review workbench with evidence, approval payloads, validation, and the next agent action.</desc>
  <rect width="1200" height="680" fill="#f7f8fb"/>
  <rect x="52" y="52" width="1096" height="576" rx="18" fill="#ffffff" stroke="#d7dde8" stroke-width="2"/>

  <text x="92" y="108" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">Agent review workbench</text>
  <text x="92" y="142" fill="#4b5563" font-family="Inter, Arial, sans-serif" font-size="16">Tool results stay structured until the user approves a typed action payload.</text>

  <g transform="translate(92 196)">
    <rect width="210" height="120" rx="12" fill="#eef6ff" stroke="#9ac5f4" stroke-width="2"/>
    <text x="24" y="34" fill="#0f3b66" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">MCP tools</text>
    <text x="24" y="66" fill="#24547f" font-family="Inter, Arial, sans-serif" font-size="14">Search, issue, CRM,</text>
    <text x="24" y="88" fill="#24547f" font-family="Inter, Arial, sans-serif" font-size="14">database, and action APIs</text>
  </g>

  <path d="M322 256 H402" stroke="#6b7280" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <g transform="translate(422 176)">
    <rect width="270" height="160" rx="12" fill="#f3f0ff" stroke="#b5a7ff" stroke-width="2"/>
    <text x="24" y="34" fill="#35216b" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Structured agent state</text>
    <rect x="24" y="58" width="222" height="22" rx="5" fill="#ffffff"/>
    <rect x="24" y="90" width="176" height="22" rx="5" fill="#ffffff"/>
    <rect x="24" y="122" width="204" height="22" rx="5" fill="#ffffff"/>
    <text x="36" y="74" fill="#4c3b83" font-family="Inter, Arial, sans-serif" font-size="12">candidates + confidence</text>
    <text x="36" y="106" fill="#4c3b83" font-family="Inter, Arial, sans-serif" font-size="12">evidence + risk</text>
    <text x="36" y="138" fill="#4c3b83" font-family="Inter, Arial, sans-serif" font-size="12">allowed decisions</text>
  </g>

  <path d="M712 256 H792" stroke="#6b7280" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <g transform="translate(812 164)">
    <rect width="260" height="184" rx="12" fill="#ecfdf3" stroke="#8dd6a5" stroke-width="2"/>
    <text x="24" y="34" fill="#14532d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">OpenUI review UI</text>
    <rect x="24" y="56" width="94" height="44" rx="8" fill="#ffffff" stroke="#bde7c8"/>
    <rect x="132" y="56" width="104" height="44" rx="8" fill="#ffffff" stroke="#bde7c8"/>
    <rect x="24" y="114" width="212" height="26" rx="7" fill="#ffffff" stroke="#bde7c8"/>
    <rect x="24" y="150" width="98" height="18" rx="6" fill="#16a34a"/>
    <rect x="138" y="150" width="98" height="18" rx="6" fill="#d97706"/>
    <text x="42" y="84" fill="#166534" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Ranked list</text>
    <text x="153" y="84" fill="#166534" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Evidence</text>
    <text x="42" y="132" fill="#166534" font-family="Inter, Arial, sans-serif" font-size="13">payload preview</text>
  </g>

  <g transform="translate(188 414)">
    <rect width="214" height="92" rx="12" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <text x="22" y="34" fill="#7c2d12" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Human decision</text>
    <text x="22" y="66" fill="#9a3412" font-family="Inter, Arial, sans-serif" font-size="14">approve, defer, reject,</text>
    <text x="22" y="84" fill="#9a3412" font-family="Inter, Arial, sans-serif" font-size="14">or request changes</text>
  </g>

  <path d="M902 348 C902 418 570 386 426 446" stroke="#6b7280" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <g transform="translate(492 398)">
    <rect width="240" height="132" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
    <text x="24" y="34" fill="#7f1d1d" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Validation gate</text>
    <text x="24" y="66" fill="#991b1b" font-family="Inter, Arial, sans-serif" font-size="14">run id matches</text>
    <text x="24" y="88" fill="#991b1b" font-family="Inter, Arial, sans-serif" font-size="14">item id exists</text>
    <text x="24" y="110" fill="#991b1b" font-family="Inter, Arial, sans-serif" font-size="14">decision is allowed</text>
  </g>

  <path d="M742 464 H822" stroke="#6b7280" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <g transform="translate(842 414)">
    <rect width="230" height="92" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <text x="22" y="34" fill="#1e3a8a" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Next agent step</text>
    <text x="22" y="66" fill="#1d4ed8" font-family="Inter, Arial, sans-serif" font-size="14">submit, mutate, notify,</text>
    <text x="22" y="84" fill="#1d4ed8" font-family="Inter, Arial, sans-serif" font-size="14">or continue researching</text>
  </g>

  <g transform="translate(92 560)">
    <circle cx="10" cy="10" r="6" fill="#2563eb"/>
    <text x="28" y="15" fill="#374151" font-family="Inter, Arial, sans-serif" font-size="14">The model composes the review surface, but the application owns schemas, allowed actions, validation, and side effects.</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
