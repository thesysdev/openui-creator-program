<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Plain text answer compared with a reviewable interface</title>
  <desc id="desc">A diagram showing how evidence, state, actions, and decision boundaries are flattened in plain text but preserved in a generated interface.</desc>
  <defs>
    <linearGradient id="surface" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffdf0" />
      <stop offset="100%" stop-color="#f6f7ff" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#111827" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="1200" height="620" rx="32" fill="url(#surface)" />
  <text x="600" y="58" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">The same AI answer, two very different surfaces</text>
  <text x="600" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4b5563">Plain text forces the user to rebuild structure. OpenUI can preserve it as state, evidence, and actions.</text>

  <g filter="url(#shadow)">
    <rect x="74" y="138" width="470" height="394" rx="18" fill="#ffffff" stroke="#e5e7eb" />
    <rect x="74" y="138" width="470" height="64" rx="18" fill="#111827" />
    <text x="104" y="178" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Plain text answer</text>
    <text x="104" y="240" font-family="Inter, Arial, sans-serif" font-size="17" fill="#111827">The release looks mostly ready.</text>
    <text x="104" y="272" font-family="Inter, Arial, sans-serif" font-size="17" fill="#111827">Unit tests passed, but the mobile</text>
    <text x="104" y="304" font-family="Inter, Arial, sans-serif" font-size="17" fill="#111827">smoke test has not run. There are</text>
    <text x="104" y="336" font-family="Inter, Arial, sans-serif" font-size="17" fill="#111827">two migrations and one environment</text>
    <text x="104" y="368" font-family="Inter, Arial, sans-serif" font-size="17" fill="#111827">variable change. Verify rollback and</text>
    <text x="104" y="400" font-family="Inter, Arial, sans-serif" font-size="17" fill="#111827">update the release notes.</text>
    <line x1="104" y1="432" x2="504" y2="432" stroke="#e5e7eb" />
    <text x="104" y="466" font-family="Inter, Arial, sans-serif" font-size="15" fill="#6b7280">Hidden work for the user:</text>
    <text x="104" y="494" font-family="Inter, Arial, sans-serif" font-size="15" fill="#6b7280">Which checks block the release? What is actionable?</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="656" y="138" width="470" height="394" rx="18" fill="#ffffff" stroke="#dbeafe" />
    <rect x="656" y="138" width="470" height="64" rx="18" fill="#2563eb" />
    <text x="686" y="178" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Generated interface</text>

    <g>
      <rect x="686" y="228" width="150" height="38" rx="19" fill="#fee2e2" />
      <circle cx="710" cy="247" r="6" fill="#ef4444" />
      <text x="727" y="253" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#991b1b">Blocked</text>
    </g>

    <g>
      <rect x="686" y="292" width="410" height="46" rx="10" fill="#f0fdf4" stroke="#bbf7d0" />
      <text x="708" y="321" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#166534">Unit tests</text>
      <text x="1022" y="321" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="15" fill="#166534">812 passed</text>
    </g>

    <g>
      <rect x="686" y="352" width="410" height="46" rx="10" fill="#fff7ed" stroke="#fed7aa" />
      <text x="708" y="381" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#9a3412">Mobile smoke test</text>
      <text x="1022" y="381" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="15" fill="#9a3412">Not run</text>
    </g>

    <g>
      <rect x="686" y="412" width="410" height="46" rx="10" fill="#eff6ff" stroke="#bfdbfe" />
      <text x="708" y="441" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">Rollback review</text>
      <text x="1022" y="441" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="15" fill="#1d4ed8">Owner needed</text>
    </g>

    <rect x="686" y="482" width="132" height="34" rx="17" fill="#111827" />
    <text x="752" y="504" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Assign QA</text>
    <rect x="832" y="482" width="158" height="34" rx="17" fill="#eef2ff" stroke="#c7d2fe" />
    <text x="911" y="504" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#3730a3">Draft notes</text>
  </g>

  <path d="M558 335 C586 335 616 335 642 335" fill="none" stroke="#9ca3af" stroke-width="3" stroke-linecap="round" />
  <path d="M630 321 L646 335 L630 349" fill="none" stroke="#9ca3af" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />

  <g>
    <rect x="380" y="556" width="440" height="34" rx="17" fill="#111827" />
    <text x="600" y="578" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Preserve evidence, state, actions, and decision boundaries</text>
  </g>
</svg>
