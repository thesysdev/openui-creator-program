<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">MCP approval contract flow</title>
  <desc id="desc">A flow from MCP tool result to OpenUI review interface, user decision, server validation, and agent continuation.</desc>
  <rect width="960" height="360" fill="#0f172a"/>
  <defs>
    <linearGradient id="card" x1="0" x2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <text x="48" y="44" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">MCP approval contract</text>
  <text x="48" y="70" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="14">Keep the approval target typed, visible, and server-validated.</text>

  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(48 118)">
      <rect width="150" height="130" rx="16" fill="url(#card)" stroke="#334155"/>
      <text x="18" y="32" fill="#f8fafc" font-size="16" font-weight="700">MCP tool result</text>
      <text x="18" y="60" fill="#cbd5e1" font-size="13">candidates[]</text>
      <text x="18" y="82" fill="#cbd5e1" font-size="13">evidence links</text>
      <text x="18" y="104" fill="#cbd5e1" font-size="13">risk + policy</text>
    </g>

    <line x1="214" y1="183" x2="286" y2="183" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>

    <g transform="translate(302 104)">
      <rect width="178" height="158" rx="16" fill="url(#card)" stroke="#334155"/>
      <text x="18" y="32" fill="#f8fafc" font-size="16" font-weight="700">OpenUI review</text>
      <rect x="18" y="52" width="142" height="22" rx="6" fill="#1e40af" opacity="0.85"/>
      <text x="28" y="68" fill="#dbeafe" font-size="12">Candidate cards</text>
      <rect x="18" y="84" width="142" height="22" rx="6" fill="#155e75" opacity="0.85"/>
      <text x="28" y="100" fill="#cffafe" font-size="12">Evidence panel</text>
      <rect x="18" y="116" width="142" height="22" rx="6" fill="#7c2d12" opacity="0.85"/>
      <text x="28" y="132" fill="#ffedd5" font-size="12">Payload preview</text>
    </g>

    <line x1="496" y1="183" x2="568" y2="183" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>

    <g transform="translate(584 118)">
      <rect width="140" height="130" rx="16" fill="url(#card)" stroke="#334155"/>
      <text x="18" y="32" fill="#f8fafc" font-size="16" font-weight="700">User decision</text>
      <text x="18" y="62" fill="#cbd5e1" font-size="13">approve</text>
      <text x="18" y="84" fill="#cbd5e1" font-size="13">reject</text>
      <text x="18" y="106" fill="#cbd5e1" font-size="13">request changes</text>
    </g>

    <line x1="740" y1="183" x2="812" y2="183" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>

    <g transform="translate(828 82)">
      <rect width="84" height="202" rx="16" fill="url(#card)" stroke="#334155"/>
      <text x="18" y="32" fill="#f8fafc" font-size="16" font-weight="700">Server</text>
      <text x="18" y="62" fill="#cbd5e1" font-size="13">policy</text>
      <text x="18" y="84" fill="#cbd5e1" font-size="13">auth</text>
      <text x="18" y="106" fill="#cbd5e1" font-size="13">audit</text>
      <line x1="18" y1="128" x2="66" y2="128" stroke="#334155"/>
      <text x="18" y="156" fill="#86efac" font-size="13">valid</text>
      <text x="18" y="178" fill="#86efac" font-size="13">agent</text>
    </g>
  </g>
</svg>
