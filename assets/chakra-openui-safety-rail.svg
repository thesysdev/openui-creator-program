<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Chakra UI as the safety rail for OpenUI generated interfaces</title>
  <desc id="desc">A pipeline diagram showing model intent flowing through an OpenUI component manifest, schema validation, a Chakra adapter, product UI rendering, and an action registry.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2D3748" />
    </marker>
    <style>
      .canvas { fill: #f7fafc; }
      .card { fill: #ffffff; stroke: #cbd5e0; stroke-width: 2; }
      .guard { fill: #fffaf0; stroke: #dd6b20; stroke-width: 2; }
      .output { fill: #f0fff4; stroke: #38a169; stroke-width: 2; }
      .title { font: 700 22px Arial, sans-serif; fill: #1a202c; }
      .label { font: 700 18px Arial, sans-serif; fill: #1a202c; }
      .text { font: 15px Arial, sans-serif; fill: #4a5568; }
      .small { font: 13px Arial, sans-serif; fill: #718096; }
      .arrow { stroke: #2d3748; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .rail { stroke: #dd6b20; stroke-width: 4; stroke-dasharray: 10 8; fill: none; }
    </style>
  </defs>

  <rect class="canvas" x="0" y="0" width="1120" height="520" rx="0" />
  <text class="title" x="54" y="54">Design-system-aware generation: OpenUI chooses intent, Chakra enforces the rails</text>
  <text class="text" x="54" y="84">The model never receives raw Chakra primitives. It emits product-level nodes that are validated, adapted, and bound to known actions.</text>

  <rect class="card" x="54" y="148" width="160" height="132" rx="8" />
  <text class="label" x="82" y="184">Model intent</text>
  <text class="text" x="78" y="216">"Refund needs</text>
  <text class="text" x="78" y="238">manual review"</text>
  <text class="small" x="78" y="264">No JSX or CSS</text>

  <path class="arrow" d="M 224 214 H 294" />

  <rect class="guard" x="304" y="132" width="184" height="164" rx="8" />
  <text class="label" x="332" y="166">OpenUI manifest</text>
  <text class="text" x="330" y="200">SummaryCard</text>
  <text class="text" x="330" y="224">ActionPanel</text>
  <text class="text" x="330" y="248">EmptyState</text>
  <text class="small" x="330" y="274">Small product vocabulary</text>

  <path class="arrow" d="M 498 214 H 568" />

  <rect class="guard" x="578" y="132" width="184" height="164" rx="8" />
  <text class="label" x="614" y="166">Validation</text>
  <text class="text" x="604" y="200">Schema checks</text>
  <text class="text" x="604" y="224">Length caps</text>
  <text class="text" x="604" y="248">Known actions</text>
  <text class="small" x="604" y="274">Invalid nodes fail closed</text>

  <path class="arrow" d="M 772 214 H 842" />

  <rect class="output" x="852" y="132" width="214" height="164" rx="8" />
  <text class="label" x="898" y="166">Chakra adapter</text>
  <text class="text" x="884" y="200">Theme tokens</text>
  <text class="text" x="884" y="224">Variants</text>
  <text class="text" x="884" y="248">Accessible states</text>
  <text class="small" x="884" y="274">Rendered product UI</text>

  <path class="rail" d="M 284 112 H 1086 V 318 H 284 Z" />
  <text class="small" x="790" y="342">Safety rail: generated output stays inside product-defined components, tokens, and actions.</text>

  <rect class="card" x="202" y="384" width="206" height="78" rx="8" />
  <text class="label" x="238" y="416">Allowed actions</text>
  <text class="small" x="234" y="444">request_refund_review</text>

  <rect class="card" x="456" y="384" width="206" height="78" rx="8" />
  <text class="label" x="496" y="416">Permissions</text>
  <text class="small" x="494" y="444">Server-owned checks</text>

  <rect class="card" x="710" y="384" width="206" height="78" rx="8" />
  <text class="label" x="746" y="416">Audit events</text>
  <text class="small" x="756" y="444">App-owned logging</text>

  <path class="arrow" d="M 959 304 C 940 362 862 368 818 384" />
  <path class="arrow" d="M 640 304 C 622 350 588 364 562 384" />
  <path class="arrow" d="M 396 304 C 376 350 334 366 306 384" />
</svg>
